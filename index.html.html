            {
                key: "marketing",
                name: "📈 Маркетолог / продюсер инфопродуктов",
                description: "Стратег, который упаковывает знания в продукт, настраивает рекламу, ищет партнёров и запускает курсы. Отвечаете за прибыль проекта.",
                formats: ["Запуски", "Таргет", "Аналитика", "Тексты для рассылок"]
            },
            {
                key: "expert",
                name: "🧠 Эксперт / предметник",
                description: "Вы — кладезь знаний в своей области. Глубоко разбираетесь в теме, проводите исследования, пишете экспертные материалы и учите других системно мыслить.",
                formats: ["Глубокие курсы", "Исследования", "Лонгриды", "Интервью"]
            },
            {
                key: "producer",
                name: "🎬 Продюсер / руководитель проектов",
                description: "Вы соединяете всё воедино: находите экспертов, ставите задачи, контролируете сроки и качество. Именно благодаря вам проекты выходят в свет.",
                formats: ["Управление", "Стратегии", "Продюсирование", "Координация"]
            }
        ];

        // Элементы страниц
        const mainPage = document.getElementById('mainPage');
        const quizPage = document.getElementById('quizPage');
        const startBtn = document.getElementById('startQuizBtn');
        const backToMainBtn = document.getElementById('backToMainBtn');

        // Элементы теста
        const quizArea = document.getElementById('quizArea');
        const resultArea = document.getElementById('resultArea');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const counterText = document.getElementById('counterText');
        const professionCard = document.getElementById('professionCard');
        const restartBtn = document.getElementById('restartBtn');

        // Состояние теста
        let currentIdx = 0;
        const totalQ = questions.length;
        let selected = new Array(totalQ).fill(null);
        let profScores = {
            video: 0, text: 0, design: 0, coach: 0, marketing: 0, expert: 0, producer: 0
        };

        // Переключение на главную
        function showMainPage() {
            mainPage.style.display = 'flex';
            quizPage.classList.remove('visible');
        }

        // Переключение на тест
        function showQuizPage() {
            mainPage.style.display = 'none';
            quizPage.classList.add('visible');
            restart(); // сброс теста при открытии
        }

        startBtn.addEventListener('click', showQuizPage);
        backToMainBtn.addEventListener('click', showMainPage);

        // Функции теста
        function recalcScores() {
            for (let k in profScores) profScores[k] = 0;
            for (let i = 0; i < selected.length; i++) {
                const ansIdx = selected[i];
                if (ansIdx !== null && i < questions.length) {
                    const opt = questions[i].options[ansIdx];
                    if (opt && opt.prof) {
                        for (let [p, val] of Object.entries(opt.prof)) {
                            if (profScores.hasOwnProperty(p)) {
                                profScores[p] += val;
                            }
                        }
                    }
                }
            }
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            questionText.innerText = q.text;

            let html = '';
            q.options.forEach((opt, optIndex) => {
                const isSel = (selected[currentIdx] === optIndex);
                const selClass = isSel ? 'selected' : '';
                html += `
                    <div class="option-btn ${selClass}" data-opt-index="${optIndex}">
                        <span class="option-prefix">${String.fromCharCode(65 + optIndex)}</span>
                        <span class="option-text">${opt.text}</span>
                    </div>
                `;
            });
            optionsContainer.innerHTML = html;

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const optIdx = parseInt(btn.dataset.optIndex);
                    if (selected[currentIdx] !== optIdx) {
                        selected[currentIdx] = optIdx;
                        recalcScores();
                        renderQuestion();
                    }
                });
            });

            const percent = ((currentIdx + 1) / totalQ) * 100;
            progressFill.style.width = percent + '%';
            counterText.innerText = (currentIdx + 1) + '/' + totalQ;

            prevBtn.disabled = (currentIdx === 0);
            nextBtn.disabled = (selected[currentIdx] === null);
            nextBtn.innerHTML = (currentIdx === totalQ - 1) ? '🏁 К профессии →' : 'Далее →';
        }

        function showProfession() {
            quizArea.classList.add('hidden');
            resultArea.classList.remove('hidden');

            let maxKey = 'video';
            let maxValue = -1;
            for (let [key, val] of Object.entries(profScores)) {
                if (val > maxValue) {
                    maxValue = val;
                    maxKey = key;
                }
            }

            const prof = professions.find(p => p.key === maxKey) || professions[0];

            professionCard.innerHTML = `
                <div class="prof-name">${prof.name}</div>
                <div class="prof-desc">${prof.description}</div>
                <div class="format-stickers">
                    ${prof.formats.map(f => `<span class="format-sticker">${f}</span>`).join('')}
                </div>
                <div style="margin-top:30px; background:#f4e3d6; border-radius:80px; padding:20px; color:#4e3f35; font-weight:500;">
                    ⚡ Рекомендованные форматы: вебинары, видеоуроки, текстовые материалы
                </div>
            `;
        }

        function restart() {
            currentIdx = 0;
            selected = new Array(totalQ).fill(null);
            profScores = { video:0, text:0, design:0, coach:0, marketing:0, expert:0, producer:0 };
            quizArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
            renderQuestion();
        }

        prevBtn.addEventListener('click', () => { if (currentIdx > 0) { currentIdx--; renderQuestion(); } });
        nextBtn.addEventListener('click', () => {
            if (nextBtn.disabled) return;
            if (currentIdx === totalQ - 1) showProfession();
            else { currentIdx++; renderQuestion(); }
        });
        restartBtn.addEventListener('click', restart);

        // Показываем главную страницу при загрузке
        showMainPage();
    })();
</script>
</body>
</html>
